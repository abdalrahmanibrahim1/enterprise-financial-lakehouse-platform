services:
  mysql_crm:
    image: mysql:8.0
    container_name: mysql_crm
    environment:
      MYSQL_DATABASE: crm
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: crm_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_crm_data:/var/lib/mysql
      - ./docker/mysql_crm/init.sql:/docker-entrypoint-initdb.d/init.sql

  postgres_core:
    image: postgres:16
    container_name: postgres_core
    environment:
      POSTGRES_DB: core
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_core_data:/var/lib/postgresql/data
      - ./docker/postgres_core/init.sql:/docker-entrypoint-initdb.d/init.sql

  postgres_warehouse:
    image: postgres:16
    container_name: postgres_warehouse
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_password
    ports:
      - "5435:5432"
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql/data
      - ./docker/postgres_warehouse/init.sql:/docker-entrypoint-initdb.d/init.sql

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_crm_data:
  postgres_core_data:
  postgres_warehouse_data:
  minio_data: